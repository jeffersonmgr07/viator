<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peru Trips | Iniciar sesión</title>
  <meta name="description" content="Acceso de proveedores de Peru Trips" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="page">
    <section class="login-card">
      <div class="alert-box">
        <div class="alert-icon">i</div>
        <div class="alert-content">
          <h3>Importante</h3>
          <p>
            Por motivos de seguridad, le recomendamos que marque o guarde esta
            página. Antes de iniciar sesión, compruebe que se encuentra en la URL correcta.
            <a href="#">https://supplier.perutrips.com</a>
          </p>
        </div>
      </div>

      <div class="brand">
        <img src="assets/img/logo1.png" alt="Peru Trips" class="brand-logo">
      </div>

      <h1 class="title">Peru Trips Supplier Log in</h1>

      <form class="login-form" id="loginForm" novalidate>
        <div class="input-group">
          <label for="email" class="sr-only">Dirección de correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Dirección de correo electrónico"
            autocomplete="email"
            required
          />
          <span class="input-icon" aria-hidden="true">🔑</span>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          Siguiente
        </button>

        <p class="helper-text" id="errorMsg"></p>
      </form>

      <p class="register-text">
        ¿No tiene una cuenta de proveedor?
        <a href="#">Registrarse</a>
      </p>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
